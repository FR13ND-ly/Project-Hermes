<div class="max-w-md mx-auto space-y-6 animate-fade-in">
  
  <!-- Breadcrumb Navigation -->
  <div class="flex items-center gap-2 text-xs text-zinc-500">
    <a routerLink="/projects" class="hover:text-zinc-300">Proiecte</a>
    <span>/</span>
    <span class="text-zinc-300 font-medium">Configurare proiect</span>
  </div>

  <!-- Page Header -->
  <div class="space-y-1">
    <h1 class="text-2xl font-bold tracking-tight text-white">Creează Proiect Nou</h1>
    <p class="text-zinc-400 text-xs">Un proiect îți permite să grupezi și să organizezi aplicațiile și bazele de date asociate.</p>
  </div>

  <!-- Form Card -->
  <div class="bg-[#0a0a0a] p-6 rounded-lg border border-zinc-800 shadow-xl space-y-6">
    
    <!-- Error Message -->
    @if (error()) {
      <div class="p-3 rounded border border-red-500/20 bg-red-950/20 text-red-400 text-xs flex items-center gap-2" role="alert">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 shrink-0" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
        </svg>
        <span>{{ error() }}</span>
      </div>
    }

    <!-- Project Details Form -->
    <div class="space-y-4">
      <div class="space-y-1.5">
        <label for="proj-name-input" class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Nume Proiect</label>
        <input 
          id="proj-name-input"
          type="text" 
          placeholder="ex. Magazin Online, API Servicii"
          [ngModel]="projectName()"
          (ngModelChange)="projectName.set($event)"
          [disabled]="loading()"
          class="block w-full px-3 py-2 text-sm bg-black border border-zinc-800 rounded text-white focus:outline-none focus:border-zinc-500 transition-colors"
          required
          aria-required="true"
        />
      </div>

      <div class="pt-4 border-t border-zinc-900 flex justify-end gap-3">
        <a 
          routerLink="/projects"
          class="px-4 py-2 rounded text-zinc-400 hover:text-white text-xs font-medium border border-zinc-800 hover:bg-zinc-900 transition-all cursor-pointer"
        >
          Anulează
        </a>
        <button 
          (click)="onCreateProject()"
          [disabled]="loading() || !projectName().trim()"
          class="px-4 py-2 rounded bg-white hover:bg-zinc-200 text-black text-xs font-semibold shadow transition-all cursor-pointer disabled:opacity-50 disabled:hover:bg-white flex items-center gap-1.5"
        >
          @if (!loading()) {
            <span>Creează Proiect</span>
          } @else {
            <svg class="animate-spin h-3.5 w-3.5 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Se creează...</span>
          }
        </button>
      </div>
    </div>

  </div>

</div>
