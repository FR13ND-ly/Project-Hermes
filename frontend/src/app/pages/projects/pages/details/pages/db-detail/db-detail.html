<div class="space-y-6 animate-fade-in" *ngIf="db()">
  
  <!-- Back button & Header Info -->
  <div class="flex flex-col gap-4 border-b border-zinc-900 pb-5">
    <div class="flex items-center gap-2">
      <a 
        [routerLink]="['/projects', parent.projectId(), 'databases']"
        class="flex items-center gap-1 text-[10px] uppercase font-bold text-zinc-550 hover:text-zinc-50 transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3 h-3">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
        Back to Databases
      </a>
    </div>

    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div class="space-y-1">
        <div class="flex items-center gap-3">
          <h2 class="text-xl font-black text-zinc-50 tracking-tight">{{ db()?.name }}</h2>
          <span 
            class="px-2 py-0.5 rounded text-[10px] font-bold border font-mono uppercase"
            [ngClass]="{
              'bg-emerald-950/20 border-emerald-900/30 text-emerald-400': db()?.status === 'running',
              'bg-orange-950/20 border-orange-900/30 text-orange-400': db()?.status === 'provisioning',
              'bg-red-950/20 border-red-900/30 text-red-400': db()?.status === 'failed'
            }"
          >
            {{ db()?.status === 'provisioning' ? 'constructing (' + (db()?.createdAt ? getLiveDuration(db()!.createdAt) : '0s') + ')' : db()?.status }}
          </span>
        </div>
        <p class="text-[10px] font-mono text-zinc-500">Database ID: {{ db()?.id }}</p>
      </div>

      <!-- Action tabs navigation -->
      <nav class="flex items-center gap-1 border-b border-transparent md:border-none" aria-label="Database subpages">
        <a 
          routerLink="overview"
          routerLinkActive
          #rlaOverview="routerLinkActive"
          [routerLinkActiveOptions]="{exact: true}"
          [class]="rlaOverview.isActive ? 'px-3 py-1.5 rounded text-xs font-semibold cursor-pointer transition-all border bg-zinc-50 text-zinc-950 border-zinc-50' : 'px-3 py-1.5 rounded text-xs font-semibold cursor-pointer transition-all border bg-transparent text-zinc-450 hover:text-zinc-50 border-zinc-850'"
        >
          Overview
        </a>

        <a
          routerLink="console"
          routerLinkActive
          #rlaConsole="routerLinkActive"
          [class]="rlaConsole.isActive ? 'px-3 py-1.5 rounded text-xs font-semibold cursor-pointer transition-all border bg-zinc-50 text-zinc-950 border-zinc-50' : 'px-3 py-1.5 rounded text-xs font-semibold cursor-pointer transition-all border bg-transparent text-zinc-450 hover:text-zinc-50 border-zinc-850'"
        >
          Query Console
        </a>

        <a
          routerLink="telemetry"
          routerLinkActive
          #rlaTelemetry="routerLinkActive"
          [class]="rlaTelemetry.isActive ? 'px-3 py-1.5 rounded text-xs font-semibold cursor-pointer transition-all border bg-zinc-50 text-zinc-950 border-zinc-50' : 'px-3 py-1.5 rounded text-xs font-semibold cursor-pointer transition-all border bg-transparent text-zinc-450 hover:text-zinc-50 border-zinc-850'"
        >
          Telemetry
        </a>

        <a
          routerLink="logs"
          routerLinkActive
          #rlaLogs="routerLinkActive"
          [class]="rlaLogs.isActive ? 'px-3 py-1.5 rounded text-xs font-semibold cursor-pointer transition-all border bg-zinc-50 text-zinc-950 border-zinc-50' : 'px-3 py-1.5 rounded text-xs font-semibold cursor-pointer transition-all border bg-transparent text-zinc-450 hover:text-zinc-50 border-zinc-850'"
        >
          Container Logs (Stdout)
        </a>

        <a
          routerLink="backups"
          routerLinkActive
          #rlaBackups="routerLinkActive"
          [class]="rlaBackups.isActive ? 'px-3 py-1.5 rounded text-xs font-semibold cursor-pointer transition-all border bg-zinc-50 text-zinc-950 border-zinc-50' : 'px-3 py-1.5 rounded text-xs font-semibold cursor-pointer transition-all border bg-transparent text-zinc-450 hover:text-zinc-50 border-zinc-850'"
        >
          Backups
        </a>

        <a
          routerLink="settings"
          routerLinkActive
          #rlaSettings="routerLinkActive"
          [class]="rlaSettings.isActive ? 'px-3 py-1.5 rounded text-xs font-semibold cursor-pointer transition-all border bg-zinc-50 text-zinc-950 border-zinc-50' : 'px-3 py-1.5 rounded text-xs font-semibold cursor-pointer transition-all border bg-transparent text-zinc-450 hover:text-zinc-50 border-zinc-850'"
        >
          Settings
        </a>
      </nav>
    </div>
  </div>

  <router-outlet></router-outlet>
</div>
