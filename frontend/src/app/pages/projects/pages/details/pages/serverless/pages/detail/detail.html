<div class="space-y-6 animate-fade-in font-mono" *ngIf="selectedInstance() as inst">
  <a [routerLink]="['/projects', parent.projectId(), 'serverless']" class="text-[11px] text-zinc-550 hover:text-zinc-50 cursor-pointer block">← Back to instance list</a>

  <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-5 flex items-center justify-between">
    <div>
      <div class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full" [class]="inst.status === 'active' ? 'bg-emerald-500' : inst.status === 'building' ? 'bg-amber-500 animate-pulse' : inst.status === 'failed' ? 'bg-red-500' : 'bg-zinc-600'"></span>
        <h3 class="text-sm font-bold text-zinc-50">{{ inst.name }}</h3>
        <span class="text-[9px] uppercase px-1.5 py-0.5 rounded bg-zinc-900 border border-zinc-800 text-zinc-400">{{ inst.runtime }}</span>
      </div>
      <p class="text-[10px] text-zinc-550 mt-1 font-sans">{{ (inst.routes || []).length }} routes · {{ inst.assignedDomain || (inst.externalPort ? ('localhost:' + inst.externalPort) : 'not deployed') }}</p>
    </div>
    <button (click)="onDeployInstance()" [disabled]="deploying() || inst.status === 'building'" class="px-4 py-2 rounded bg-zinc-50 hover:bg-zinc-200 text-zinc-950 text-xs font-bold cursor-pointer disabled:opacity-50">
      {{ deploying() || inst.status === 'building' ? 'Building...' : '🚀 Deploy' }}
    </button>
  </div>

  <!-- Tabs -->
  <div class="flex items-center gap-4 border-b border-zinc-900 text-xs pb-3.5">
    <a 
      routerLink="details"
      routerLinkActive
      #rlaDetails="routerLinkActive"
      [class]="rlaDetails.isActive ? 'border-b-2 border-zinc-50 text-zinc-50 pb-3 px-1 font-bold' : 'text-zinc-500 hover:text-zinc-300 pb-3 px-1 border-b-2 border-transparent'" 
      class="cursor-pointer transition-all"
    >
      Details
    </a>
    <a 
      routerLink="routes"
      routerLinkActive
      #rlaRoutes="routerLinkActive"
      [class]="rlaRoutes.isActive ? 'border-b-2 border-zinc-50 text-zinc-50 pb-3 px-1 font-bold' : 'text-zinc-500 hover:text-zinc-300 pb-3 px-1 border-b-2 border-transparent'" 
      class="cursor-pointer transition-all"
    >
      Routes
    </a>
    <a 
      routerLink="settings"
      routerLinkActive
      #rlaSettings="routerLinkActive"
      [class]="rlaSettings.isActive ? 'border-b-2 border-zinc-50 text-zinc-50 pb-3 px-1 font-bold' : 'text-zinc-500 hover:text-zinc-300 pb-3 px-1 border-b-2 border-transparent'" 
      class="cursor-pointer transition-all"
    >
      Settings
    </a>
    <a 
      routerLink="env"
      routerLinkActive
      #rlaEnv="routerLinkActive"
      [class]="rlaEnv.isActive ? 'border-b-2 border-zinc-50 text-zinc-50 pb-3 px-1 font-bold' : 'text-zinc-500 hover:text-zinc-300 pb-3 px-1 border-b-2 border-transparent'" 
      class="cursor-pointer transition-all"
    >
      Variables
    </a>
    <a 
      routerLink="metrics"
      routerLinkActive
      #rlaMetrics="routerLinkActive"
      [class]="rlaMetrics.isActive ? 'border-b-2 border-zinc-50 text-zinc-50 pb-3 px-1 font-bold' : 'text-zinc-500 hover:text-zinc-300 pb-3 px-1 border-b-2 border-transparent'" 
      class="cursor-pointer transition-all"
    >
      Telemetry
    </a>
    <a 
      routerLink="builds"
      routerLinkActive
      #rlaBuilds="routerLinkActive"
      [class]="rlaBuilds.isActive ? 'border-b-2 border-zinc-50 text-zinc-50 pb-3 px-1 font-bold' : 'text-zinc-500 hover:text-zinc-300 pb-3 px-1 border-b-2 border-transparent'" 
      class="cursor-pointer transition-all"
    >
      Builds
    </a>
    <a 
      routerLink="logs"
      routerLinkActive
      #rlaLogs="routerLinkActive"
      [class]="rlaLogs.isActive ? 'border-b-2 border-zinc-50 text-zinc-50 pb-3 px-1 font-bold' : 'text-zinc-500 hover:text-zinc-300 pb-3 px-1 border-b-2 border-transparent'" 
      class="cursor-pointer transition-all"
    >
      Logs
    </a>
  </div>

  <router-outlet></router-outlet>
</div>
