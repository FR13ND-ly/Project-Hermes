<div class="space-y-6 animate-fade-in font-sans max-w-2xl">
  <div class="flex items-center justify-between border-b border-zinc-900 pb-4">
    <div>
      <h3 class="text-[13px] font-bold text-zinc-300 uppercase tracking-wider font-mono">Create Authentication Service</h3>
      <p class="text-xs text-zinc-550 mt-0.5">Provision a new BaaS Authentication instance for your workspace.</p>
    </div>
    <button (click)="onCancel()" class="text-[13px] text-zinc-400 hover:text-zinc-50 cursor-pointer font-sans flex items-center gap-1">
      ← Back to list
    </button>
  </div>

  <div class="bg-zinc-900 p-5 rounded border border-zinc-900 space-y-4 shadow-sm">
    <div class="grid gap-4 md:grid-cols-2 font-mono">
      <!-- Service Name -->
      <div class="space-y-1.5">
        <label for="service-name" class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Service Name</label>
        <input
          id="service-name"
          type="text"
          placeholder="e.g. Auth Service, My BaaS"
          [ngModel]="newServiceName()"
          (ngModelChange)="newServiceName.set($event)"
          [disabled]="creatingService()"
          class="block w-full px-3 py-2 text-[13px] bg-zinc-950 border border-zinc-800 rounded text-zinc-50 focus:outline-none focus:border-zinc-550 transition-colors"
        />
      </div>
    </div>

    <!-- Publish variables to project env pool -->
    <div class="pt-4 border-t border-zinc-900 space-y-4">
      <p class="text-xs text-zinc-500 font-mono">Choose which environment variables should be added to the project pool when creating the service.</p>

      <!-- App ID publication -->
      <div class="space-y-2 select-none">
        <label class="flex items-center gap-2.5 cursor-pointer">
          <input
            type="checkbox"
            [checked]="publishAppId()"
            (change)="publishAppId.set(!publishAppId())"
            [disabled]="creatingService()"
            class="h-3.5 w-3.5 bg-zinc-950 border border-zinc-800 rounded accent-zinc-50 cursor-pointer"
          />
          <span class="text-[13px] font-semibold text-zinc-300">Publish App ID to project .env</span>
        </label>
        @if (publishAppId()) {
          <div class="flex items-center gap-2 pl-6 animate-fade-in font-mono">
            <label for="baas-appid-key" class="text-xs font-bold text-zinc-550 uppercase tracking-wider shrink-0">Variable name:</label>
            <input
              id="baas-appid-key"
              type="text"
              placeholder="ex. HERMES_AUTH_APP_ID"
              [ngModel]="appIdEnvKeyName()"
              (ngModelChange)="appIdEnvKeyName.set($event)"
              [disabled]="creatingService()"
              class="block w-full max-w-xs px-2.5 py-1.5 text-[13px] bg-zinc-950 border border-zinc-800 rounded text-zinc-50 focus:outline-none focus:border-zinc-500 transition-colors uppercase font-bold"
            />
          </div>
        }
      </div>

      <!-- Secret Key publication -->
      <div class="space-y-2 select-none">
        <label class="flex items-center gap-2.5 cursor-pointer">
          <input
            type="checkbox"
            [checked]="publishSecret()"
            (change)="publishSecret.set(!publishSecret())"
            [disabled]="creatingService()"
            class="h-3.5 w-3.5 bg-zinc-950 border border-zinc-800 rounded accent-zinc-50 cursor-pointer"
          />
          <span class="text-[13px] font-semibold text-zinc-300">Publish JWT Secret to project .env</span>
        </label>
        @if (publishSecret()) {
          <div class="flex items-center gap-2 pl-6 animate-fade-in font-mono">
            <label for="baas-secret-key" class="text-xs font-bold text-zinc-555 uppercase tracking-wider shrink-0">Variable name:</label>
            <input
              id="baas-secret-key"
              type="text"
              placeholder="ex. HERMES_AUTH_SECRET"
              [ngModel]="secretEnvKeyName()"
              (ngModelChange)="secretEnvKeyName.set($event)"
              [disabled]="creatingService()"
              class="block w-full max-w-xs px-2.5 py-1.5 text-[13px] bg-zinc-950 border border-zinc-800 rounded text-zinc-50 focus:outline-none focus:border-zinc-500 transition-colors uppercase font-bold"
            />
          </div>
        }
      </div>

      <!-- API Key publication -->
      <div class="space-y-2 select-none">
        <label class="flex items-center gap-2.5 cursor-pointer">
          <input
            type="checkbox"
            [checked]="publishApiKey()"
            (change)="publishApiKey.set(!publishApiKey())"
            [disabled]="creatingService()"
            class="h-3.5 w-3.5 bg-zinc-950 border border-zinc-800 rounded accent-zinc-50 cursor-pointer"
          />
          <span class="text-[13px] font-semibold text-zinc-300">Publish Default API Key to project .env</span>
        </label>
        @if (publishApiKey()) {
          <div class="flex items-center gap-2 pl-6 animate-fade-in font-mono">
            <label for="baas-apikey-key" class="text-xs font-bold text-zinc-555 uppercase tracking-wider shrink-0">Variable name:</label>
            <input
              id="baas-apikey-key"
              type="text"
              placeholder="ex. HERMES_APP_TOKEN"
              [ngModel]="apiKeyEnvKeyName()"
              (ngModelChange)="apiKeyEnvKeyName.set($event)"
              [disabled]="creatingService()"
              class="block w-full max-w-xs px-2.5 py-1.5 text-[13px] bg-zinc-950 border border-zinc-800 rounded text-zinc-50 focus:outline-none focus:border-zinc-500 transition-colors uppercase font-bold"
            />
          </div>
        }
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="pt-4 border-t border-zinc-900 flex justify-end gap-3">
      <button
        type="button"
        (click)="onCancel()"
        [disabled]="creatingService()"
        class="px-4 py-2 rounded border border-zinc-800 bg-zinc-900/50 text-zinc-400 hover:text-zinc-50 text-[13px] font-semibold cursor-pointer transition-colors"
      >
        Cancel
      </button>
      <button
        type="button"
        (click)="onCreateService()"
        [disabled]="creatingService() || !newServiceName().trim()"
        class="px-4 py-2 rounded btn-primary text-[13px] font-bold disabled:opacity-50 cursor-pointer transition-colors flex items-center gap-1.5"
      >
        @if (creatingService()) {
          <svg class="animate-spin h-3.5 w-3.5 text-zinc-950" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>Creating...</span>
        } @else {
          <span>Create Service</span>
        }
      </button>
    </div>
  </div>
</div>
