<div class="space-y-4 animate-fade-in">
  <div class="border border-zinc-900 bg-zinc-950 rounded p-5 shadow-inner">
    <div class="flex items-center justify-between border-b border-zinc-900 pb-3 mb-4">
      <h4 class="text-xs font-bold text-zinc-400 uppercase tracking-wider">Bucket Audit Log</h4>
      <span class="text-[9px] text-zinc-650 bg-zinc-950 px-2 py-0.5 rounded uppercase font-semibold">Live Events</span>
    </div>

    <div class="space-y-2.5 max-h-[480px] overflow-y-auto pr-1">
      @for (log of parent.activityLogs(); track $index) {
        <div class="flex items-start text-xs leading-relaxed font-mono">
          <span class="text-zinc-600 mr-3 shrink-0 select-none">[{{ log.time | date:'yyyy-MM-dd HH:mm:ss' }}]</span>
          
          @if (log.type === 'success') {
            <span class="text-emerald-500 mr-2 shrink-0 select-none">[OK]</span>
          } @else if (log.type === 'warning') {
            <span class="text-red-400 mr-2 shrink-0 select-none">[WARN]</span>
          } @else {
            <span class="text-blue-500 mr-2 shrink-0 select-none">[INFO]</span>
          }

          <span class="text-zinc-350 font-sans">{{ log.message }}</span>
        </div>
      } @empty {
        <div class="text-center py-10 text-xs text-zinc-650 font-mono">No activity recorded yet on this bucket.</div>
      }
    </div>
  </div>
</div>
