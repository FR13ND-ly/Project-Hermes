<div class="space-y-6 animate-fade-in max-w-xl mx-auto py-4 font-mono text-zinc-350">
  
  <div class="flex items-center justify-between border-b border-zinc-900 pb-3">
    <div class="space-y-0.5">
      <h3 class="text-sm font-bold text-zinc-50 uppercase tracking-wider font-sans">Create Serverless Instance</h3>
      <p class="text-[10px] text-zinc-500 font-medium font-sans">Deploy an isolated, auto-scaling function handler in the cluster.</p>
    </div>
    <button 
      (click)="onCancel()"
      [disabled]="creating()"
      class="text-zinc-550 hover:text-zinc-50 cursor-pointer transition-colors"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <div class="space-y-4 py-2 text-xs">
    
    <!-- Instance Name -->
    <div class="space-y-1.5">
      <label for="serverless-name" class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider font-mono">Instance Name</label>
      <input 
        id="serverless-name"
        type="text" 
        placeholder="Name (e.g. api-payments)" 
        [ngModel]="newName()" 
        (ngModelChange)="newName.set($event)" 
        [disabled]="creating()"
        class="block w-full px-3 py-2 text-xs bg-zinc-950 border border-zinc-850 rounded text-zinc-50 focus:outline-none focus:border-zinc-500 font-mono" 
      />
    </div>

    <!-- Runtime -->
    <div class="space-y-1.5">
      <label for="serverless-runtime" class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider font-mono">Runtime Engine</label>
      <select 
        id="serverless-runtime"
        [ngModel]="newRuntime()" 
        (ngModelChange)="newRuntime.set($event)" 
        [disabled]="creating()"
        class="block w-full px-3 py-2 text-xs bg-zinc-950 border border-zinc-850 rounded text-zinc-50 focus:outline-none focus:border-zinc-500 cursor-pointer font-mono"
      >
        <option value="nodejs-cjs">Node.js (CommonJS)</option>
        <option value="nodejs-esm">Node.js (ES Modules)</option>
        <option value="python">Python 3.11 (Flask)</option>
      </select>
    </div>

    <!-- Memory limit -->
    <div class="space-y-1.5">
      <label for="serverless-memory" class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider font-mono">Memory Limit</label>
      <select 
        id="serverless-memory"
        [ngModel]="newMemory()" 
        (ngModelChange)="newMemory.set($event)" 
        [disabled]="creating()"
        class="block w-full px-3 py-2 text-xs bg-zinc-950 border border-zinc-855 rounded text-zinc-50 focus:outline-none focus:border-zinc-550 cursor-pointer font-mono"
      >
        <option [ngValue]="0">Memory: Unlimited</option>
        <option [ngValue]="128">Memory: 128 MB</option>
        <option [ngValue]="256">Memory: 256 MB</option>
        <option [ngValue]="512">Memory: 512 MB</option>
        <option [ngValue]="1024">Memory: 1024 MB</option>
      </select>
    </div>

  </div>

  <div class="flex justify-end gap-2 pt-3 border-t border-zinc-900 font-sans">
    <button 
      (click)="onCancel()" 
      [disabled]="creating()" 
      class="px-3 py-1.5 rounded border border-zinc-850 text-zinc-450 hover:text-zinc-50 hover:bg-zinc-950 text-xs font-semibold cursor-pointer"
    >
      Cancel
    </button>
    <button 
      (click)="onCreateInstance()" 
      [disabled]="creating() || !newName().trim()" 
      class="px-4 py-1.5 rounded bg-zinc-50 hover:bg-zinc-200 text-zinc-950 text-xs font-bold shadow cursor-pointer disabled:opacity-50 flex items-center gap-1.5"
    >
      @if (creating()) {
        <svg class="animate-spin h-3.5 w-3.5 text-zinc-950" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Creating...</span>
      } @else {
        <span>Create</span>
      }
    </button>
  </div>

</div>
