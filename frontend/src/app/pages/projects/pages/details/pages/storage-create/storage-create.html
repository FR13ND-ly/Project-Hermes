<div class="space-y-6 animate-fade-in max-w-xl mx-auto py-4">
  
  <div class="flex items-center justify-between gap-4">
    <div class="space-y-0.5">
      <h2 class="text-lg font-semibold tracking-tight text-zinc-50">Create New Bucket</h2>
      <p class="text-[13px] text-zinc-500">Configure static files, media storage and rules for your project.</p>
    </div>
    <button 
      (click)="onCancel()"
      [disabled]="creatingBucket()"
      class="btn btn-secondary btn-sm shrink-0"
    >
      Cancel
    </button>
  </div>

  <div class="space-y-6">
    <div class="grid gap-4 md:grid-cols-2">
      <!-- Bucket Name -->
      <div class="space-y-1.5">
        <label for="bucket-name" class="text-xs font-semibold text-zinc-400">Bucket Name (slug)</label>
        <input
          id="bucket-name"
          type="text"
          placeholder="e.g. product-images, uploads"
          [ngModel]="newBucketName()"
          (ngModelChange)="newBucketName.set($event)"
          [disabled]="creatingBucket()"
          class="block w-full px-3 py-2 text-[13px] input font-mono"
        />
      </div>

      <!-- Max Size Limit -->
      <div class="space-y-1.5">
        <div class="flex items-center justify-between">
          <label class="text-xs font-semibold text-zinc-400">Storage Limit</label>
          <span class="text-zinc-50 text-[13px] font-bold font-mono">{{ maxBucketSizeGb() }} GB</span>
        </div>
        <input 
          type="range" 
          min="1" 
          max="50" 
          step="1"
          [ngModel]="maxBucketSizeGb()"
          (ngModelChange)="maxBucketSizeGb.set($event)"
          [disabled]="creatingBucket()"
          class="w-full h-1 bg-zinc-900 rounded-lg appearance-none cursor-pointer accent-zinc-50 mt-3"
        />
      </div>
    </div>

    <p class="text-xs text-zinc-600 pt-1 font-sans">Buckets are private — file access is secured with app_id/secret_key.</p>

    <!-- Public Access Toggle -->
    <div class="pt-4 border-t border-zinc-900 space-y-4">
      <label class="flex items-center gap-2.5 cursor-pointer select-none">
        <input
          type="checkbox"
          [checked]="isPublicToggle()"
          (change)="isPublicToggle.set(!isPublicToggle())"
          [disabled]="creatingBucket()"
          class="h-3.5 w-3.5 bg-zinc-950 border border-zinc-800 rounded accent-zinc-50 cursor-pointer"
        />
        <span class="text-[13px] font-semibold text-zinc-300 font-sans">Expose files publicly (read-only URL)</span>
      </label>
    </div>

    <!-- Publish to project env pool -->
    <div class="pt-4 border-t border-zinc-900 space-y-4">
      <!-- App ID publication -->
      <div class="space-y-2">
        <label class="flex items-center gap-2.5 cursor-pointer select-none">
          <input
            type="checkbox"
            [checked]="publishAppId()"
            (change)="publishAppId.set(!publishAppId())"
            [disabled]="creatingBucket()"
            class="h-3.5 w-3.5 bg-zinc-950 border border-zinc-800 rounded accent-zinc-50 cursor-pointer"
          />
          <span class="text-[13px] font-semibold text-zinc-300 font-sans">Add App ID to project .env</span>
        </label>
        @if (publishAppId()) {
          <div class="flex items-center gap-2 pl-6 animate-fade-in">
            <label for="bucket-appid-key" class="text-xs font-semibold text-zinc-500 shrink-0">Variable name (.env):</label>
            <input
              id="bucket-appid-key"
              type="text"
              placeholder="ex. STORAGE_APP_ID"
              [ngModel]="appIdEnvKeyName()"
              (ngModelChange)="appIdEnvKeyName.set($event)"
              [disabled]="creatingBucket()"
              class="block w-full max-w-xs px-2.5 py-1.5 text-[13px] input font-mono uppercase font-bold"
            />
          </div>
        }
      </div>

      <!-- Secret Key publication -->
      <div class="space-y-2">
        <label class="flex items-center gap-2.5 cursor-pointer select-none">
          <input
            type="checkbox"
            [checked]="publishSecretKey()"
            (change)="publishSecretKey.set(!publishSecretKey())"
            [disabled]="creatingBucket()"
            class="h-3.5 w-3.5 bg-zinc-950 border border-zinc-800 rounded accent-zinc-50 cursor-pointer"
          />
          <span class="text-[13px] font-semibold text-zinc-300 font-sans">Add Secret Key to project .env</span>
        </label>
        @if (publishSecretKey()) {
          <div class="flex items-center gap-2 pl-6 animate-fade-in">
            <label for="bucket-secret-key" class="text-xs font-semibold text-zinc-500 shrink-0">Variable name (.env):</label>
            <input
              id="bucket-secret-key"
              type="text"
              placeholder="ex. STORAGE_SECRET_KEY"
              [ngModel]="secretKeyEnvKeyName()"
              (ngModelChange)="secretKeyEnvKeyName.set($event)"
              [disabled]="creatingBucket()"
              class="block w-full max-w-xs px-2.5 py-1.5 text-[13px] input font-mono uppercase font-bold"
            />
          </div>
        }
      </div>
    </div>

    <!-- Per-file size limit -->
    <div class="pt-4 border-t border-zinc-900 space-y-3">
      <div class="flex items-center gap-2">
        <label for="bucket-max-file" class="text-xs font-semibold text-zinc-500 shrink-0">Max size / file (MB):</label>
        <input
          id="bucket-max-file"
          type="number"
          min="0"
          step="1"
          placeholder="0 = unlimited"
          [ngModel]="maxFileSizeMb()"
          (ngModelChange)="maxFileSizeMb.set($event)"
          [disabled]="creatingBucket()"
          class="block w-32 px-2.5 py-1.5 text-[13px] input font-mono"
        />
        <span class="text-xs text-zinc-600 font-sans">0 = unlimited</span>
      </div>
      
      <label class="flex items-center gap-2.5 cursor-pointer select-none">
        <input
          type="checkbox"
          [checked]="allowCustomProcessing()"
          (change)="allowCustomProcessing.set(!allowCustomProcessing())"
          [disabled]="creatingBucket()"
          class="h-3.5 w-3.5 bg-zinc-950 border border-zinc-800 rounded accent-zinc-50 cursor-pointer"
        />
        <span class="text-[13px] font-semibold text-zinc-300 font-sans">Allow custom image processing overrides on upload</span>
      </label>
    </div>

  </div>

  <div class="pt-4.5 border-t border-zinc-900 flex justify-end gap-3 font-sans">
    <button 
      (click)="onCancel()"
      [disabled]="creatingBucket()"
      class="btn btn-secondary"
    >
      Cancel
    </button>
    <button 
      (click)="onCreateBucket()"
      [disabled]="creatingBucket() || !newBucketName().trim()"
      class="btn btn-primary"
    >
      @if (!creatingBucket()) {
        <span>Create Bucket</span>
      } @else {
        <svg class="animate-spin h-3.5 w-3.5 text-zinc-950" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Creating...</span>
      }
    </button>
  </div>

</div>
