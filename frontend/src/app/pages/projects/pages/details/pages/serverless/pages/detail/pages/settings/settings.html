<div class="space-y-6 max-w-2xl animate-fade-in">
  <div class="card p-5 space-y-4">
    <h4 class="text-sm font-semibold text-zinc-100 border-b border-zinc-900 pb-2.5">Instance configuration</h4>
    <div class="grid gap-3 sm:grid-cols-2">
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-zinc-400 uppercase">Name</label>
        <input type="text" [ngModel]="editName()" (ngModelChange)="editName.set($event)" class="block w-full px-3 py-2 text-[13px] input" />
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-zinc-400 uppercase">Runtime</label>
        <select [ngModel]="editRuntime()" (ngModelChange)="editRuntime.set($event)" class="block w-full px-3 py-2 text-[13px] input cursor-pointer">
          <option value="nodejs-cjs">Node.js (CommonJS)</option>
          <option value="nodejs-esm">Node.js (ES Modules)</option>
          <option value="python">Python 3.11 (Flask)</option>
        </select>
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-zinc-400 uppercase">Memory Limit</label>
        <select [ngModel]="editMemory()" (ngModelChange)="editMemory.set($event)" class="block w-full px-3 py-2 text-[13px] input cursor-pointer">
          <option [ngValue]="0">Unlimited</option>
          <option [ngValue]="128">128 MB</option>
          <option [ngValue]="256">256 MB</option>
          <option [ngValue]="512">512 MB</option>
          <option [ngValue]="1024">1024 MB</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card p-5 space-y-3">
    <div class="flex items-center justify-between border-b border-zinc-900 pb-2.5">
      <h4 class="text-sm font-semibold text-zinc-100">Domeniu & Rutare</h4>
      <button (click)="onOpenAddDomainModal()" class="btn btn-secondary btn-sm">+ Associate Domain</button>
    </div>
    <div class="space-y-1.5">
      <label class="text-xs font-semibold text-zinc-400 uppercase">Associated Domain (instance)</label>
      <select [ngModel]="editAssignedDomain()" (ngModelChange)="editAssignedDomain.set($event)" class="block w-full px-3 py-2 text-[13px] input cursor-pointer">
        <option [ngValue]="null">[No domain]</option>
        @for (d of domains(); track d.id) { <option [ngValue]="d.fqdn">{{ d.fqdn }}</option> }
      </select>
      <p class="text-xs text-zinc-600 font-sans">All instance routes are served under this domain.</p>
    </div>
  </div>

  <div class="flex items-center justify-between">
    <button (click)="onDeleteInstance()" class="px-3 py-2 rounded border border-red-950/40 text-red-500/90 hover:bg-red-950/20 text-[13px] font-semibold cursor-pointer">Delete Instance</button>
    <button (click)="onSaveSettings()" [disabled]="savingSettings()" class="btn btn-primary">{{ savingSettings() ? 'Saving...' : 'Save Settings' }}</button>
  </div>

  <!-- ================= REGISTER DOMAIN MODAL ================= -->
  @if (showAddDomainModal()) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-zinc-950/70 backdrop-blur-sm p-4" (click)="showAddDomainModal.set(false)">
      <div class="w-full max-w-md card p-5 space-y-4" (click)="$event.stopPropagation()">
        <h3 class="text-sm font-semibold text-zinc-100">Register Domain</h3>
        <input type="text" placeholder="api.exemplu.ro" [ngModel]="newDomainFqdn()" (ngModelChange)="newDomainFqdn.set($event)" class="block w-full px-3 py-2 text-[13px] input" />
        <div class="flex justify-end gap-2">
          <button (click)="showAddDomainModal.set(false)" class="btn btn-secondary btn-sm">Cancel</button>
          <button (click)="onRegisterDomain()" [disabled]="addingDomain()" class="btn btn-primary btn-sm">{{ addingDomain() ? 'Registering...' : 'Register' }}</button>
        </div>
      </div>
    </div>
  }
</div>
