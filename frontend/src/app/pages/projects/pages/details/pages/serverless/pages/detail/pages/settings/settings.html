<div class="space-y-6 max-w-2xl animate-fade-in">
  <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-5 space-y-4">
    <h4 class="text-[11px] font-bold text-zinc-300 uppercase tracking-wider border-b border-zinc-900 pb-2.5">Instance configuration</h4>
    <div class="grid gap-3 sm:grid-cols-2">
      <div class="space-y-1.5">
        <label class="text-[10px] font-semibold text-zinc-400 uppercase">Name</label>
        <input type="text" [ngModel]="editName()" (ngModelChange)="editName.set($event)" class="block w-full px-3 py-2 text-xs bg-zinc-950 border border-zinc-850 rounded text-zinc-50 focus:outline-none focus:border-zinc-500" />
      </div>
      <div class="space-y-1.5">
        <label class="text-[10px] font-semibold text-zinc-400 uppercase">Runtime</label>
        <select [ngModel]="editRuntime()" (ngModelChange)="editRuntime.set($event)" class="block w-full px-3 py-2 text-xs bg-zinc-950 border border-zinc-850 rounded text-zinc-50 focus:outline-none focus:border-zinc-500 cursor-pointer">
          <option value="nodejs-cjs">Node.js (CommonJS)</option>
          <option value="nodejs-esm">Node.js (ES Modules)</option>
          <option value="python">Python 3.11 (Flask)</option>
        </select>
      </div>
      <div class="space-y-1.5">
        <label class="text-[10px] font-semibold text-zinc-400 uppercase">Memory Limit</label>
        <select [ngModel]="editMemory()" (ngModelChange)="editMemory.set($event)" class="block w-full px-3 py-2 text-xs bg-zinc-950 border border-zinc-850 rounded text-zinc-50 focus:outline-none focus:border-zinc-500 cursor-pointer">
          <option [ngValue]="0">Unlimited</option>
          <option [ngValue]="128">128 MB</option>
          <option [ngValue]="256">256 MB</option>
          <option [ngValue]="512">512 MB</option>
          <option [ngValue]="1024">1024 MB</option>
        </select>
      </div>
    </div>
  </div>

  <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-5 space-y-3">
    <div class="flex items-center justify-between border-b border-zinc-900 pb-2.5">
      <h4 class="text-[11px] font-bold text-zinc-300 uppercase tracking-wider">Domeniu & Rutare</h4>
      <button (click)="onOpenAddDomainModal()" class="px-2.5 py-1 rounded border border-zinc-800 text-zinc-300 hover:bg-zinc-900 hover:text-zinc-50 text-[10px] font-semibold cursor-pointer">+ Associate Domain</button>
    </div>
    <div class="space-y-1.5">
      <label class="text-[10px] font-semibold text-zinc-400 uppercase">Associated Domain (instance)</label>
      <select [ngModel]="editAssignedDomain()" (ngModelChange)="editAssignedDomain.set($event)" class="block w-full px-3 py-2 text-xs bg-zinc-950 border border-zinc-850 rounded text-zinc-50 focus:outline-none focus:border-zinc-500 cursor-pointer">
        <option [ngValue]="null">[No domain]</option>
        @for (d of domains(); track d.id) { <option [ngValue]="d.fqdn">{{ d.fqdn }}</option> }
      </select>
      <p class="text-[10px] text-zinc-600 font-sans">All instance routes are served under this domain.</p>
    </div>
  </div>

  <div class="flex items-center justify-between">
    <button (click)="onDeleteInstance()" class="px-3 py-2 rounded border border-red-950/40 text-red-500/90 hover:bg-red-950/20 text-xs font-semibold cursor-pointer">Delete Instance</button>
    <button (click)="onSaveSettings()" [disabled]="savingSettings()" class="px-4 py-2 rounded bg-zinc-50 hover:bg-zinc-200 text-zinc-950 text-xs font-bold cursor-pointer disabled:opacity-50">{{ savingSettings() ? 'Saving...' : 'Save Settings' }}</button>
  </div>

  <!-- ================= REGISTER DOMAIN MODAL ================= -->
  @if (showAddDomainModal()) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-zinc-950/70 backdrop-blur-sm p-4" (click)="showAddDomainModal.set(false)">
      <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-xl p-5 space-y-4" (click)="$event.stopPropagation()">
        <h3 class="text-xs font-bold text-zinc-200 uppercase tracking-wider">Register Domain</h3>
        <input type="text" placeholder="api.exemplu.ro" [ngModel]="newDomainFqdn()" (ngModelChange)="newDomainFqdn.set($event)" class="block w-full px-3 py-2 text-xs bg-zinc-950 border border-zinc-850 rounded text-zinc-50 focus:outline-none focus:border-zinc-500" />
        <div class="flex justify-end gap-2">
          <button (click)="showAddDomainModal.set(false)" class="px-3 py-1.5 rounded border border-zinc-800 text-zinc-400 hover:text-zinc-50 hover:bg-zinc-900 text-xs font-semibold cursor-pointer">Cancel</button>
          <button (click)="onRegisterDomain()" [disabled]="addingDomain()" class="px-3 py-1.5 rounded bg-zinc-50 hover:bg-zinc-200 text-zinc-950 text-xs font-semibold cursor-pointer disabled:opacity-50">{{ addingDomain() ? 'Registering...' : 'Register' }}</button>
        </div>
      </div>
    </div>
  }
</div>
