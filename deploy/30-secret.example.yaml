# Copy to 30-secret.yaml and fill in. NEVER commit the filled version.
# Generate values:
#   JWT_SECRET           -> openssl rand -hex 32        (>= 32 chars; required)
#   HERMES_ENCRYPTION_KEY-> openssl rand -hex 16        (EXACTLY 32 bytes; required)
#   HERMES_ROOT_PASSWORD -> openssl rand -hex 16        (first-boot super-admin)
#   <db-pass>            -> openssl rand -hex 16
# IMPORTANT: the password in POSTGRES_PASSWORD and in DATABASE_URL must match.
apiVersion: v1
kind: Secret
metadata:
  name: hermes-secrets
  namespace: hermes-system
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_ME_min_32_chars"
  HERMES_ENCRYPTION_KEY: "REPLACE_ME_exactly_32_bytes_long"
  HERMES_ROOT_PASSWORD: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME_db_pass"
  DATABASE_URL: "postgres://postgres:REPLACE_ME_db_pass@hermes-postgres:5432/hermes_db"
