name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (check + test)
    runs-on: ubuntu-latest
    env:
      # Compile sqlx query! macros against the committed offline cache (backend/.sqlx),
      # so CI needs no live database.
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: cargo test (compiles + unit tests)
        working-directory: backend
        run: cargo test --bin backend --locked

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Angular 22's CLI engine requires Node ^22.22.3 || ^24.15.0 || >=26.
          # Node 20 is no longer supported and fails the build.
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci
      - name: Production build
        working-directory: frontend
        run: npm run build
